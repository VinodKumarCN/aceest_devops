name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------------------------------------
  # Job 1: Lint & static checks
  # -------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: |
          # Stop the build if there are syntax errors or undefined names.
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but do not fail the build.
          flake8 app.py --count --exit-zero --max-complexity=12 --max-line-length=100 --statistics

  # -------------------------------------------------------
  # Job 2: Unit tests (runs directly on the runner)
  # -------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/test_app.py -v --tb=short

  # -------------------------------------------------------
  # Job 3: Build Docker image and run tests inside container
  # -------------------------------------------------------
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .

      - name: Run pytest inside Docker container
        run: |
          docker run --rm \
            -e DB_PATH=/tmp/test_aceest.db \
            aceest-fitness:${{ github.sha }} \
            python -m pytest tests/test_app.py -v --tb=short

      - name: Verify app starts and /health responds
        run: |
          # Start the container in detached mode
          docker run -d --name aceest-smoke \
            -p 5000:5000 \
            -e DB_PATH=/tmp/smoke.db \
            aceest-fitness:${{ github.sha }}
          # Wait up to 15s for the app to be ready
          timeout 15 bash -c 'until curl -sf http://localhost:5000/health; do sleep 1; done'
          docker stop aceest-smoke
          docker rm aceest-smoke
