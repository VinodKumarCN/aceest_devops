name: ACEest CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --exit-zero --max-complexity=12 --max-line-length=100 --statistics

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: |
          cd $GITHUB_WORKSPACE
          python -m pytest tests/test_app.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
          DB_PATH: /tmp/test_aceest.db

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-fitness:${{ github.sha }} .

      - name: Run pytest inside Docker container
        run: |
          docker run --rm \
            -e DB_PATH=/tmp/test_aceest.db \
            -e PYTHONPATH=/app \
            aceest-fitness:${{ github.sha }} \
            python -m pytest tests/test_app.py -v --tb=short

      - name: Smoke test
        run: |
          docker run -d --name aceest-smoke \
            -p 5000:5000 \
            -e DB_PATH=/tmp/smoke.db \
            aceest-fitness:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:5000/health
          docker stop aceest-smoke
          docker rm aceest-smoke